services:
  ts-vault:
    image: tailscale/tailscale:latest
    hostname: ts-vault
    cap_add: [ "NET_ADMIN", "SYS_MODULE" ]
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ts_state:/var/lib/tailscale
      - ./certs:/staging-certs:ro
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${VAULT_AUTHKEY}
      - TS_HOSTNAME=vault
      - TS_ACCEPT_DNS=true
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--login-server=https://${HEADSCALE_DOMAIN}
      - SSL_CERT_DIR=${SSL_CERT_DIR}
      - TS_USERSPACE=false
      - TS_TAILSCALED_EXTRA_ARGS=--tun=tailscale0
    restart: unless-stopped

  vaultwarden-lan:
    image: vaultwarden/server:latest
    ports:
      - "127.0.0.1:8080:80"
    environment:
      - DOMAIN=https://${LAN_DOMAIN}
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURITY=${SMTP_SECURITY}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - vw_data:/data
    restart: unless-stopped

  vaultwarden-lab:
    image: vaultwarden/server:latest
    network_mode: "service:ts-vault"
    environment:
      - DOMAIN=https://passwords.${LAB_DOMAIN}
      - ROCKET_PORT=8081
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURITY=${SMTP_SECURITY}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - vw_data:/data
    depends_on:
      - vaultwarden-lan
    restart: unless-stopped

  consul-register:
    image: curlimages/curl:8.8.0
    network_mode: "service:ts-vault"
    environment:
      - CONSUL_ADDR=http://${INFRA_VPS_TAILNET_IP}:8500
      - SERVICE_NAME=vaultwarden
      - SERVICE_ID=vaultwarden-vault
      - SERVICE_HOST=vault.${TAILNET_DOMAIN}
      - SERVICE_PORT=8081
      - ROUTE_HOST=passwords.${LAB_DOMAIN}
    command: >
      sh -c '
        RULE=$(echo "Host(__H__)" | sed "s/__H__/\`$$ROUTE_HOST\`/");
        PAYLOAD="{
          \"Name\": \"$$SERVICE_NAME\",
          \"ID\": \"$$SERVICE_ID\",
          \"Address\": \"$$SERVICE_HOST\",
          \"Port\": $$SERVICE_PORT,
          \"Tags\": [
            \"traefik.enable=true\",
            \"traefik.http.routers.$$SERVICE_NAME.rule=$$RULE\",
            \"traefik.http.routers.$$SERVICE_NAME.entrypoints=websecure\",
            \"traefik.http.routers.$$SERVICE_NAME.tls=true\",
            \"traefik.http.routers.$$SERVICE_NAME.tls.certresolver=dns\"
          ],
          \"Check\": {
            \"TCP\": \"$$SERVICE_HOST:$$SERVICE_PORT\",
            \"Interval\": \"10s\",
            \"DeregisterCriticalServiceAfter\": \"2m\"
          }
        }";
        while true; do
          if curl -sf -X PUT "$$CONSUL_ADDR/v1/agent/service/register" \
               -H "Content-Type: application/json" \
               -d "$$PAYLOAD"; then
            echo "Registered $$SERVICE_ID";
          else
            echo "Failed to register $$SERVICE_ID, retrying in 60s...";
          fi;
          sleep 60;
        done
      '
    depends_on:
      - ts-vault
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    network_mode: "service:ts-vault"
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./tailnet/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - ts-vault
    restart: unless-stopped

  backup:
    image: offen/docker-volume-backup:latest
    volumes:
      - ./bitwarden:/backup/bitwarden:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - BACKUP_CRON_EXPRESSION=0 3 * * 0
      - BACKUP_FILENAME=vaultwarden-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_RETENTION_DAYS=56
      - AWS_S3_BUCKET_NAME=${BACKUP_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}
      - AWS_S3_REGION=${BACKUP_AWS_REGION}
      - AWS_S3_PATH=vaultwarden/
      - WEBDAV_URL=${BACKUP_WEBDAV_URL}
      - WEBDAV_PATH=/vaultwarden/
      - WEBDAV_USERNAME=${BACKUP_WEBDAV_USER}
      - WEBDAV_PASSWORD=${BACKUP_WEBDAV_PASSWORD}
      - NOTIFICATION_URLS=smtp://${SMTP_USERNAME}:${SMTP_PASSWORD}@${SMTP_HOST}:${SMTP_PORT}/?from=${SMTP_FROM}&to=${ALERT_EMAIL}&starttls=yes
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    command:
      - "--monitor-only"
      - "--schedule=0 0 3 * * *"
      - "--notification-url=smtp://${SMTP_USERNAME}:${SMTP_PASSWORD}@${SMTP_HOST}:${SMTP_PORT}/?from=${SMTP_FROM}&to=${ALERT_EMAIL}&starttls=yes"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.45
    restart: unless-stopped

  traefik-lan:
    image: traefik:v3.6.9
    network_mode: host
    command:
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--log.level=INFO"
    volumes:
      - ./traefik-lan/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
    restart: unless-stopped


volumes:
  ts_state:
  vw_data:
